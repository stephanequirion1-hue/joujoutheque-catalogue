name: Export catalogue Joujouthèque

on:
  schedule:
    - cron: '0 6 * * *' # Chaque jour à 6h UTC (2h du matin EST)
  workflow_dispatch: # Permet de lancer manuellement

permissions:
  contents: write

jobs:
  export-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install

      - name: Export catalogue depuis Dataverse
        env:
          TENANT_ID: ${{ secrets.TENANT_ID }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          DATAVERSE_URL: ${{ secrets.DATAVERSE_URL }}
        run: npm run export

      - name: Deploy vers gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Copier le contenu public
          cp -r public /tmp/public-output

          # Créer ou checkout la branche gh-pages
          git fetch origin gh-pages || true
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf .
          fi

          # Remplacer le contenu
          rm -rf *
          cp -r /tmp/public-output/* .

          # Commit et push
          git add -A
          git diff --staged --quiet || git commit -m "Catalogue mis à jour $(date -u +%Y-%m-%d)"
          git push origin gh-pages
